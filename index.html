<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁소 앱</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {margin:0;background:#f8fafc;font-family:system-ui;}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React;
const today = new Date().toISOString().split("T")[0];

const TOP = ["반팔티","긴팔티","맨투맨","후드","니트","셔츠","패딩","코트","자켓"];
const BOTTOM = ["청바지","슬랙스","반바지","치마","레깅스"];
const ETC = ["원피스","이불","커튼","가방","모자"];

function App(){

const [view,setView]=useState("list");
const [picker,setPicker]=useState(null);
const [search,setSearch]=useState("");
const [selected,setSelected]=useState(null);
const [editMsg,setEditMsg]=useState("");
const [customItem,setCustomItem]=useState("");
const [editingId,setEditingId]=useState(null);

const [customers,setCustomers]=useState(()=>{
  const s=localStorage.getItem("laundry");
  return s?JSON.parse(s):[];
});

const [form,setForm]=useState({
  name:"",phone:"",price:"",pickupDate:"",items:[]
});

useEffect(()=>{
  localStorage.setItem("laundry",JSON.stringify(customers));
},[customers]);

/* 메시지 */
const makeMsg=c=>`안녕하세요 ${c.name}님 😊
세탁이 완료되었습니다.
방문 부탁드립니다.`;

/* 문자 */
const sendSMSDirect=c=>{
  window.location.href=`sms:${c.phone}?body=${encodeURIComponent(makeMsg(c))}`;
};

/* 카톡 */
const sendKakaoDirect=c=>{
  window.open(`https://share.kakao.com/?text=${encodeURIComponent(makeMsg(c))}`);
};

/* 메시지 수정 */
const openEditMsg=c=>{
  setSelected(c);
  setEditMsg(makeMsg(c));
};

const sendSMS=()=>{
  window.location.href=`sms:${selected.phone}?body=${encodeURIComponent(editMsg)}`;
};

const sendKakao=()=>{
  window.open(`https://share.kakao.com/?text=${encodeURIComponent(editMsg)}`);
};

/* 품목 추가 */
const addItem=(cat,type)=>{
  setForm(f=>({...f,items:[...f.items,{cat,type}]}));
  setPicker(null);
};

/* 기타 직접 입력 */
const addCustomItem=()=>{
  if(!customItem.trim()) return;
  setForm(f=>({...f,items:[...f.items,{cat:"etc",type:customItem}]}));
  setCustomItem("");
  setPicker(null);
};

/* 저장 (수정 포함) */
const submit=()=>{
  if(!form.name||!form.phone) return alert("입력");

  if(editingId){
    setCustomers(customers.map(c=>
      c.id===editingId?{...c,...form}:c
    ));
  }else{
    setCustomers([...customers,{
      ...form,
      id:Date.now(),
      status:"세탁중",
      date:today
    }]);
  }

  setForm({name:"",phone:"",price:"",pickupDate:"",items:[]});
  setEditingId(null);
  setView("list");
};

/* 상태 변경 */
const toggle=id=>{
  setCustomers(customers.map(c=>
    c.id===id?{...c,status:c.status==="완료"?"세탁중":"완료"}:c
  ));
};

/* 삭제 */
const deleteCustomer=id=>{
  if(!confirm("삭제하시겠습니까?")) return;
  setCustomers(customers.filter(c=>c.id!==id));
};

/* 수정 */
const startEdit=c=>{
  setForm({
    name:c.name,
    phone:c.phone,
    price:c.price,
    pickupDate:c.pickupDate,
    items:c.items
  });
  setEditingId(c.id);
  setView("add");
};

/* 엑셀 */
const exportCSV=()=>{
  let rows=[["이름","연락처","가격","상태","날짜","항목"]];
  customers.forEach(c=>{
    rows.push([
      c.name,c.phone,c.price,c.status,c.date,
      c.items.map(i=>i.type).join("|")
    ]);
  });
  const blob=new Blob(["\ufeff"+rows.map(r=>r.join(",")).join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="세탁소.csv";
  a.click();
};

const list=customers.filter(c=>
  c.name.includes(search)||c.phone.includes(search)
);

/* 접수 화면 */
if(view==="add"){
return (
<div style={page}>
<h2>{editingId?"고객 수정":"접수"}</h2>

<input placeholder="이름" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={input}/>
<input placeholder="연락처" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} style={input}/>
<input placeholder="가격" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} style={input}/>
<input type="date" value={form.pickupDate} onChange={e=>setForm({...form,pickupDate:e.target.value})} style={input}/>

<button onClick={()=>setPicker("top")} style={btnGray}>상의</button>
<button onClick={()=>setPicker("bottom")} style={btnGray}>하의</button>
<button onClick={()=>setPicker("etc")} style={btnGray}>기타</button>

<div>
{form.items.map((i,idx)=><span key={idx} style={tag}>{i.type}</span>)}
</div>

<button onClick={submit} style={btn}>{editingId?"수정 완료":"저장"}</button>
<button onClick={()=>setView("list")} style={btnGray}>뒤로</button>

{picker && (
<div style={modal}>
{(picker==="top"?TOP:picker==="bottom"?BOTTOM:ETC).map(i=>(
<button key={i} onClick={()=>addItem(picker,i)} style={btnSmall}>{i}</button>
))}

{picker==="etc" && (
<div>
<input placeholder="직접 입력" value={customItem}
 onChange={e=>setCustomItem(e.target.value)} style={input}/>
<button onClick={addCustomItem} style={btn}>추가</button>
</div>
)}

</div>
)}

</div>
);
}

/* 리스트 */
return (
<div style={page}>
<h1>🧺 한국사 세탁소</h1>

<input placeholder="검색" value={search} onChange={e=>setSearch(e.target.value)} style={input}/>

<button onClick={()=>setView("add")} style={btn}>+ 접수</button>
<button onClick={exportCSV} style={btnGray}>엑셀 다운로드</button>

{list.map(c=>(
<div key={c.id} style={card}>
<b>{c.name}</b> ({c.status})<br/>
{c.phone}<br/>
{c.price}원<br/>

<button onClick={()=>toggle(c.id)} style={btnSmall}>상태</button>

<button onClick={()=>sendSMSDirect(c)} style={btnSmall}>📩 문자</button>

<button onClick={()=>sendKakaoDirect(c)} style={btnSmall}>💬 카톡</button>

<button onClick={()=>openEditMsg(c)} style={btnSmall}>✏️ 메시지</button>

<button onClick={()=>startEdit(c)} style={btnSmall}>🛠 수정</button>

<button onClick={()=>deleteCustomer(c.id)} style={{...btnSmall,background:"#fecaca"}}>
🗑 삭제
</button>

</div>
))}


{selected && (
<div style={modal}>
<textarea value={editMsg} onChange={e=>setEditMsg(e.target.value)} style={{width:"100%",height:120}}/>
<button onClick={sendSMS} style={btn}>문자 보내기</button>
<button onClick={sendKakao} style={btn}>카톡 보내기</button>
<button onClick={()=>setSelected(null)} style={btnGray}>닫기</button>
</div>
)}

</div>
);
}

const page={padding:20,maxWidth:480,margin:"auto"};
const input={width:"100%",padding:10,margin:"5px 0",borderRadius:8,border:"1px solid #ddd"};
const btn={width:"100%",padding:12,marginTop:10,background:"#3b82f6",color:"#fff",border:"none",borderRadius:10};
const btnGray={...btn,background:"#94a3b8"};
const btnSmall={margin:3,padding:6,borderRadius:6};
const card={background:"#fff",padding:10,marginTop:10,borderRadius:10};
const tag={background:"#e0e7ff",padding:"3px 6px",margin:3,display:"inline-block"};
const modal={position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:10};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
