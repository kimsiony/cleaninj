<script type="text/babel">

const {useState,useEffect} = React;
const today = new Date().toISOString().split("T")[0];

const TOP = ["반팔티","긴팔티","맨투맨","후드","니트","셔츠","패딩","코트","자켓"];
const BOTTOM = ["청바지","슬랙스","반바지","치마","레깅스"];
const ETC = ["원피스","이불","커튼","가방","모자"];

function App(){

const [view,setView]=useState("list");
const [picker,setPicker]=useState(null);
const [search,setSearch]=useState("");

const [selected,setSelected]=useState(null);
const [editCustomer,setEditCustomer]=useState(null);
const [editMsg,setEditMsg]=useState("");
const [customItem,setCustomItem]=useState("");

const [customers,setCustomers]=useState(()=>{
  const s=localStorage.getItem("laundry");
  return s?JSON.parse(s):[];
});

const [form,setForm]=useState({
  name:"",phone:"",price:"",pickupDate:"",items:[]
});

useEffect(()=>{
  localStorage.setItem("laundry",JSON.stringify(customers));
},[customers]);

/* 🔥 전화번호로 기존 고객 찾기 */
const findCustomerByPhone=(phone)=>{
  return customers.find(c=>c.phone===phone);
};

/* 🔥 전화 입력 시 자동 불러오기 */
const onPhoneChange=(phone)=>{
  const exist=findCustomerByPhone(phone);

  setForm(f=>({
    ...f,
    phone,
    name: exist ? exist.name : f.name
  }));
};

/* 메시지 */
const makeMsg=c=>`안녕하세요 ${c.name}님 😊
세탁이 완료되었습니다.
방문 부탁드립니다 🙏`;

/* 문자 / 카톡 */
const sendSMSDirect=(c)=>{
  window.location.href=`sms:${c.phone}?body=${encodeURIComponent(makeMsg(c))}`;
};

const sendKakaoDirect=(c)=>{
  window.open(`https://share.kakao.com/?text=${encodeURIComponent(makeMsg(c))}`);
};

/* 저장 (🔥 기존 고객이면 "새 접수" 추가) */
const submit=()=>{

  if(!form.name||!form.phone) return alert("입력");

  setCustomers([
    ...customers,
    {
      ...form,
      id:Date.now(),
      status:"세탁중",
      date:today
    }
  ]);

  setForm({name:"",phone:"",price:"",pickupDate:"",items:[]});
  setView("list");
};

/* 상태 변경 */
const toggle=id=>{
  setCustomers(customers.map(c=>
    c.id===id?{...c,status:c.status==="완료"?"세탁중":"완료"}:c
  ));
};

/* 🔥 고객 정보 수정 */
const openEditCustomer=(phone)=>{
  const c=findCustomerByPhone(phone);
  setEditCustomer(c);
};

const saveCustomerEdit=()=>{
  setCustomers(customers.map(c=>
    c.phone===editCustomer.phone?editCustomer:c
  ));
  setEditCustomer(null);
};

/* 리스트 필터 */
const list=customers.filter(c=>
  c.name.includes(search)||c.phone.includes(search)
);

/* 접수 */
if(view==="add"){
return (
<div style={page}>
<h2>접수</h2>

<input placeholder="이름" value={form.name}
onChange={e=>setForm({...form,name:e.target.value})}
style={input}/>

{/* 🔥 핵심: 전화번호 자동조회 */}
<input placeholder="연락처"
value={form.phone}
onChange={e=>onPhoneChange(e.target.value)}
style={input}/>

<button onClick={()=>{
  const c=findCustomerByPhone(form.phone);
  if(c) alert("기존 고객입니다. 정보가 자동 적용됩니다.");
}} style={btnGray}>
기존 고객 확인
</button>

<input placeholder="가격" value={form.price}
onChange={e=>setForm({...form,price:e.target.value})}
style={input}/>

<input type="date" value={form.pickupDate}
onChange={e=>setForm({...form,pickupDate:e.target.value})}
style={input}/>

<button onClick={()=>setPicker("top")} style={btnGray}>상의</button>
<button onClick={()=>setPicker("bottom")} style={btnGray}>하의</button>
<button onClick={()=>setPicker("etc")} style={btnGray}>기타</button>

<div>
{form.items.map((i,idx)=>
<span key={idx} style={tag}>{i.type}</span>
)}
</div>

<button onClick={submit} style={btn}>저장</button>
<button onClick={()=>setView("list")} style={btnGray}>뒤로</button>

{picker && (
<div style={modal}>
{(picker==="top"?TOP:picker==="bottom"?BOTTOM:ETC).map(i=>(
<button key={i} onClick={()=>setForm(f=>({...f,items:[...f.items,{cat:picker,type:i}]}))}
style={btnSmall}>{i}</button>
))}

</div>
)}

</div>
);
}

/* 리스트 */
return (
<div style={page}>
<h1>🧺 세탁소</h1>

<input placeholder="검색" value={search}
onChange={e=>setSearch(e.target.value)} style={input}/>

<button onClick={()=>setView("add")} style={btn}>+ 접수</button>

{list.map(c=>(
<div key={c.id} style={card}>
<b>{c.name}</b> ({c.status})<br/>
{c.phone}<br/>
{c.price}원<br/>

<button onClick={()=>toggle(c.id)} style={btnSmall}>상태</button>
<button onClick={()=>sendSMSDirect(c)} style={btnSmall}>📩 문자</button>
<button onClick={()=>sendKakaoDirect(c)} style={btnSmall}>💬 카톡</button>

{/* 🔥 고객 수정 */}
<button onClick={()=>openEditCustomer(c.phone)} style={btnSmall}>
👤 고객수정
</button>

</div>
))}

{/* 🔥 고객 수정 모달 */}
{editCustomer && (
<div style={modal}>
<h3>고객정보 수정</h3>

<input value={editCustomer.name}
onChange={e=>setEditCustomer({...editCustomer,name:e.target.value})}
style={input}/>

<input value={editCustomer.phone}
onChange={e=>setEditCustomer({...editCustomer,phone:e.target.value})}
style={input}/>

<button onClick={saveCustomerEdit} style={btn}>저장</button>
<button onClick={()=>setEditCustomer(null)} style={btnGray}>닫기</button>
</div>
)}

</div>
);
}

const page={padding:20,maxWidth:480,margin:"auto"};
const input={width:"100%",padding:10,margin:"5px 0",borderRadius:8,border:"1px solid #ddd"};
const btn={width:"100%",padding:12,marginTop:10,background:"#3b82f6",color:"#fff",border:"none",borderRadius:10};
const btnGray={...btn,background:"#94a3b8"};
const btnSmall={margin:3,padding:6,borderRadius:6};
const card={background:"#fff",padding:10,marginTop:10,borderRadius:10};
const tag={background:"#e0e7ff",padding:"3px 6px",margin:3,display:"inline-block"};
const modal={position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:10};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
