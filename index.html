<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁소 앱</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {margin:0;background:#f8fafc;font-family:system-ui;}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React;
const today = new Date().toISOString().split("T")[0];

const TOP = ["반팔티","긴팔티","맨투맨","후드","니트","셔츠","패딩","코트","자켓"];
const BOTTOM = ["청바지","슬랙스","반바지","치마","레깅스"];
const ETC = ["원피스","이불","커튼","가방","모자"];

function App(){

const [view,setView]=useState("list");
const [picker,setPicker]=useState(null);
const [search,setSearch]=useState("");

const [editItem,setEditItem]=useState(null);
const [editForm,setEditForm]=useState(null);

const [customItem,setCustomItem]=useState("");

const [customers,setCustomers]=useState(()=>{
  const s=localStorage.getItem("laundry");
  return s?JSON.parse(s):[];
});

const [form,setForm]=useState({
  name:"",
  phone:"",
  price:"",
  pickupDate:"",
  items:[],
  isExisting:false,
  customerIndex:null
});

useEffect(()=>{
  localStorage.setItem("laundry",JSON.stringify(customers));
},[customers]);

/* 🔥 고객 찾기 */
const findCustomer=(phone)=>{
  return customers.find(c=>c.phone===phone);
};

/* 🔥 전화 입력 자동조회 */
const onPhoneChange=(phone)=>{
  const exist=findCustomer(phone);

  if(exist){
    setForm({
      name:exist.name,
      phone,
      price:"",
      pickupDate:"",
      items:[],
      isExisting:true,
      customerIndex:customers.indexOf(exist)
    });
  }else{
    setForm({
      name:"",
      phone,
      price:"",
      pickupDate:"",
      items:[],
      isExisting:false,
      customerIndex:null
    });
  }
};

/* 메시지 */
const makeMsg=c=>`안녕하세요 ${c.name}님 😊
세탁 완료되었습니다. 방문 부탁드립니다 🙏`;

/* 저장 (신규 or 재방문) */
const submit=()=>{

if(!form.name||!form.phone) return alert("입력");

const newHistory={
  id:Date.now(),
  items:form.items,
  status:"세탁중",
  date:today,
  pickupDate:""
};

let updated=[...customers];

if(form.isExisting){
  updated[form.customerIndex]={
    ...updated[form.customerIndex],
    history:[...(updated[form.customerIndex].history||[]), newHistory]
  };
}else{
  updated.push({
    name:form.name,
    phone:form.phone,
    history:[newHistory]
  });
}

setCustomers(updated);
setForm({name:"",phone:"",price:"",pickupDate:"",items:[]});
setView("list");
};

/* 상태 + 찾아간 날짜 */
const toggle=(phone,id)=>{

setCustomers(customers.map(c=>{
  if(c.phone!==phone) return c;

  return {
    ...c,
    history:c.history.map(h=>{
      if(h.id===id){
        const newStatus=h.status==="완료"?"세탁중":"완료";
        return {
          ...h,
          status:newStatus,
          pickupDate:newStatus==="완료"?today:""
        };
      }
      return h;
    })
  };
}));
};

/* 접수 수정 */
const openEdit=(phone,item)=>{
  setEditItem({phone,id:item.id});
  setEditForm(item);
};

const saveEdit=()=>{

setCustomers(customers.map(c=>{
  if(c.phone!==editItem.phone) return c;

  return {
    ...c,
    history:c.history.map(h=>{
      if(h.id===editItem.id){
        return editForm;
      }
      return h;
    })
  };
}));

setEditItem(null);
setEditForm(null);
};

/* 항목 추가 */
const addItem=(cat,type)=>{
  setForm(f=>({...f,items:[...f.items,{cat,type}]}));
  setPicker(null);
};

/* 리스트 */
const list=customers.filter(c=>
  c.name.includes(search)||c.phone.includes(search)
);

/* ================= UI ================= */

return (
<div style={page}>

<h1>🧺 세탁소</h1>

<input
placeholder="검색"
value={search}
onChange={e=>setSearch(e.target.value)}
style={input}
/>

<button onClick={()=>setView("add")} style={btn}>+ 접수</button>

{/* ================= 접수 ================= */}
{view==="add" && (
<div>

<h2>접수</h2>

<input placeholder="이름"
value={form.name}
onChange={e=>setForm({...form,name:e.target.value})}
style={input}
/>

<input placeholder="전화번호"
value={form.phone}
onChange={e=>onPhoneChange(e.target.value)}
style={input}
/>

<input placeholder="가격"
value={form.price}
onChange={e=>setForm({...form,price:e.target.value})}
style={input}
/>

<input type="date"
value={form.pickupDate}
onChange={e=>setForm({...form,pickupDate:e.target.value})}
style={input}
/>

<button onClick={()=>setPicker("top")} style={btnGray}>상의</button>
<button onClick={()=>setPicker("bottom")} style={btnGray}>하의</button>
<button onClick={()=>setPicker("etc")} style={btnGray}>기타</button>

<div>
{form.items.map((i,idx)=>
<span key={idx} style={tag}>{i.type}</span>
)}
</div>

<button onClick={submit} style={btn}>저장</button>
<button onClick={()=>setView("list")} style={btnGray}>뒤로</button>

{picker && (
<div style={modal}>
{(picker==="top"?TOP:picker==="bottom"?BOTTOM:ETC).map(i=>(
<button key={i}
onClick={()=>addItem(picker,i)}
style={btnSmall}>{i}</button>
))}
</div>
)}

</div>
)}

{/* ================= 리스트 ================= */}
{view==="list" && (
<div>

{list.map(c=>(
<div key={c.phone} style={card}>
<b>{c.name}</b><br/>
{c.phone}<br/>

{c.history?.map(h=>(
<div key={h.id} style={{background:"#eef2ff",margin:5,padding:5}}>

<div>{h.items.map(i=>i.type).join(", ")}</div>
<div>상태: {h.status}</div>
<div>접수: {h.date}</div>

{h.pickupDate && (
<div style={{color:"green"}}>
찾아간 날짜: {h.pickupDate}
</div>
)}

<button onClick={()=>toggle(c.phone,h.id)} style={btnSmall}>상태</button>
<button onClick={()=>openEdit(c.phone,h)} style={btnSmall}>수정</button>

</div>
))}

</div>
))}

</div>
)}

{/* ================= 수정 ================= */}
{editItem && (
<div style={modal}>

<h3>접수 수정</h3>

<textarea
value={JSON.stringify(editForm)}
onChange={e=>setEditForm(JSON.parse(e.target.value))}
style={{width:"100%",height:120}}
/>

<button onClick={saveEdit} style={btn}>저장</button>
<button onClick={()=>setEditItem(null)} style={btnGray}>닫기</button>

</div>
)}

</div>
);
}

/* 스타일 */
const page={padding:20,maxWidth:500,margin:"auto"};
const input={width:"100%",padding:10,margin:5,border:"1px solid #ddd",borderRadius:8};
const btn={width:"100%",padding:12,marginTop:10,background:"#3b82f6",color:"#fff",border:"none",borderRadius:10};
const btnGray={...btn,background:"#94a3b8"};
const btnSmall={margin:3,padding:5};
const card={background:"#fff",padding:10,marginTop:10,borderRadius:10};
const tag={background:"#e0e7ff",padding:"3px 6px",margin:3,display:"inline-block"};
const modal={position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:10};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
