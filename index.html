<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>은현이네 세탁소</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: #f5f6f8;
}

/* 상단 */
.header {
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  color: white;
  padding: 30px 20px;
  text-align: center;
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
}

.header h1 {
  margin: 0;
  font-size: 24px;
}

.header p {
  margin: 5px 0 0;
  opacity: 0.9;
}

/* 홈 버튼 */
.menu {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.card {
  padding: 20px;
  border-radius: 16px;
  color: white;
  font-weight: bold;
  text-align: center;
  cursor: pointer;
}

.blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
.green { background: linear-gradient(135deg, #10b981, #059669); }

/* 화면 */
.screen {
  display: none;
  padding: 16px;
}

/* 입력폼 */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* 버튼 */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
}

/* 리스트 */
.item {
  background: white;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.price {
  float: right;
  color: #2563eb;
  font-weight: bold;
}

.small {
  color: #666;
  font-size: 13px;
}

/* 하단 네비 */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #eee;
}

.nav div {
  font-size: 12px;
  text-align: center;
  color: #666;
}

.nav div.active {
  color: #2563eb;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- 홈 -->
<div id="home">
  <div class="header">
    <h1>은현이네 세탁소</h1>
    <p>30년 전통, 믿고 맡겨주세요</p>
  </div>

  <div class="menu">
    <div class="card blue" onclick="go('register')">고객 접수</div>
    <div class="card green" onclick="go('list')">세탁 진행중</div>
    <div class="card blue">완료 고객</div>
    <div class="card green">매출 보기</div>
  </div>
</div>

<!-- 고객 등록 -->
<div id="register" class="screen">
  <h3>고객 접수</h3>
  <input id="name" placeholder="이름">
  <input id="phone" placeholder="전화번호">
  <input id="price" placeholder="가격">
  <button class="btn" onclick="add()">접수하기</button>
</div>

<!-- 리스트 -->
<div id="list" class="screen">
  <h3>세탁 진행중</h3>
  <div id="items"></div>
</div>

<!-- 하단 네비 -->
<div class="nav">
  <div class="active" onclick="go('home')">홈</div>
  <div onclick="go('list')">고객</div>
  <div>알림</div>
  <div>설정</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data") || "[]");

function go(screen) {
  document.getElementById("home").style.display = "none";
  document.getElementById("register").style.display = "none";
  document.getElementById("list").style.display = "none";

  if(screen === "home") document.getElementById("home").style.display = "block";
  if(screen === "register") document.getElementById("register").style.display = "block";
  if(screen === "list") {
    render();
    document.getElementById("list").style.display = "block";
  }
}

function add() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const price = document.getElementById("price").value;

  data.push({ name, phone, price, done:false });
  localStorage.setItem("data", JSON.stringify(data));

  alert("접수 완료");
  go("home");
}

function render() {
  const el = document.getElementById("items");
  el.innerHTML = "";

  data.forEach((d,i)=>{
    el.innerHTML += `
      <div class="item">
        <strong>${d.name}</strong>
        <span class="price">${d.price}원</span><br>
        <div class="small">${d.phone}</div>
        <button onclick="toggle(${i})">완료 처리</button>
      </div>
    `;
  });
}

function toggle(i){
  data[i].done = !data[i].done;
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

go("home");
</script>

</body>
</html>
