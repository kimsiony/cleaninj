<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁소 앱</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {margin:0;background:#f8fafc;font-family:system-ui;}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React;
const today = new Date().toISOString().split("T")[0];

const TOP = ["티셔츠","셔츠","니트","패딩","코트","자켓"];
const BOTTOM = ["청바지","슬랙스","반바지","치마"];
const ETC = ["원피스","이불","가방","커튼"];
const STATUS = ["세탁대기","세탁중","세탁완료"];

function App(){

const [view,setView]=useState("list");
const [picker,setPicker]=useState(null);
const [search,setSearch]=useState("");
const [selected,setSelected]=useState(null);
const [editMsg,setEditMsg]=useState("");
const [editingId,setEditingId]=useState(null);

const [customers,setCustomers]=useState(()=>{
  const s=localStorage.getItem("laundry");
  return s?JSON.parse(s):[];
});

const [form,setForm]=useState({
  name:"",phone:"",price:"",pickupDate:"",items:[]
});

/* 저장 */
useEffect(()=>{
  localStorage.setItem("laundry",JSON.stringify(customers));
},[customers]);

/* 상태 */
const changeStatus=id=>{
  setCustomers(customers.map(c=>{
    if(c.id!==id) return c;
    const idx=STATUS.indexOf(c.status);
    return {...c,status:STATUS[(idx+1)%3]};
  }));
};

/* 색상 */
const color=s=>{
  if(s==="세탁대기") return "#94a3b8";
  if(s==="세탁중") return "#f59e0b";
  return "#22c55e";
};

/* 품목 추가 */
const addItem=(cat,type)=>{
  setForm(f=>{
    const exist=f.items.find(i=>i.type===type);
    if(exist){
      return {
        ...f,
        items:f.items.map(i=>i.type===type?{...i,count:i.count+1}:i)
      };
    }
    return {...f,items:[...f.items,{cat,type,count:1}]};
  });
  setPicker(null);
};

/* 수량 변경 */
const changeCount=(type,delta)=>{
  setForm(f=>({
    ...f,
    items:f.items.map(i=>{
      if(i.type!==type) return i;
      const newCount=i.count+delta;
      return newCount<=0?null:{...i,count:newCount};
    }).filter(Boolean)
  }));
};

/* 저장 */
const submit=()=>{
  if(!form.name||!form.phone) return alert("입력");

  if(editingId){
    setCustomers(customers.map(c=>c.id===editingId?{...c,...form}:c));
  }else{
    setCustomers([...customers,{
      ...form,
      id:Date.now(),
      status:"세탁대기",
      date:today
    }]);
  }

  setForm({name:"",phone:"",price:"",pickupDate:"",items:[]});
  setEditingId(null);
  setView("list");
};

/* 삭제 */
const del=id=>{
  if(!confirm("삭제?")) return;
  setCustomers(customers.filter(c=>c.id!==id));
};

/* 메시지 */
const msg=c=>`안녕하세요 ${c.name}님 😊\n세탁 완료되었습니다.`;

const sms=c=>window.location.href=`sms:${c.phone}?body=${encodeURIComponent(msg(c))}`;
const kakao=c=>window.open(`https://share.kakao.com/?text=${encodeURIComponent(msg(c))}`);

/* 입력 */
if(view==="add"){
return (
<div style={page}>
<h2>접수</h2>

<input placeholder="이름" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={input}/>
<input placeholder="연락처" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} style={input}/>
<input placeholder="가격" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} style={input}/>
<input type="date" value={form.pickupDate} onChange={e=>setForm({...form,pickupDate:e.target.value})} style={input}/>

<button onClick={()=>setPicker("top")} style={btnGray}>상의</button>
<button onClick={()=>setPicker("bottom")} style={btnGray}>하의</button>
<button onClick={()=>setPicker("etc")} style={btnGray}>기타</button>

{/* 선택된 항목 */}
<div>
{form.items.map((i,idx)=>(
<div key={idx} style={{margin:5}}>
{i.type} x {i.count}
<button onClick={()=>changeCount(i.type,1)}>+</button>
<button onClick={()=>changeCount(i.type,-1)}>-</button>
</div>
))}
</div>

<button onClick={submit} style={btn}>저장</button>
<button onClick={()=>setView("list")} style={btnGray}>취소</button>

{/* 선택창 */}
{picker && (
<div style={modal}>
{(picker==="top"?TOP:picker==="bottom"?BOTTOM:ETC).map(i=>(
<button key={i} onClick={()=>addItem(picker,i)} style={btnSmall}>{i}</button>
))}
</div>
)}

</div>
);
}

/* 리스트 */
const list=customers.filter(c=>c.name.includes(search)||c.phone.includes(search));

return (
<div style={page}>
<h1>🧺 세탁소</h1>

<input placeholder="검색" value={search} onChange={e=>setSearch(e.target.value)} style={input}/>
<button onClick={()=>setView("add")} style={btn}>+ 접수</button>

{list.map(c=>(
<div key={c.id} style={card}>
<b>{c.name}</b><br/>
{c.phone}<br/>
{c.items.map(i=>`${i.type} x${i.count}`).join(",")}<br/>

<button onClick={()=>changeStatus(c.id)} style={{...btnSmall,background:color(c.status),color:"#fff"}}>
{c.status}
</button>

<button onClick={()=>sms(c)} style={btnSmall}>📩</button>
<button onClick={()=>kakao(c)} style={btnSmall}>💬</button>
<button onClick={()=>del(c.id)} style={btnSmall}>🗑</button>

</div>
))}

</div>
);
}

const page={padding:20,maxWidth:480,margin:"auto"};
const input={width:"100%",padding:10,margin:"5px 0"};
const btn={width:"100%",padding:12,marginTop:10,background:"#3b82f6",color:"#fff"};
const btnGray={...btn,background:"#94a3b8"};
const btnSmall={margin:3,padding:6};
const card={background:"#fff",padding:10,marginTop:10};
const modal={position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:10};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
