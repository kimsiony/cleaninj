<!-- Updated index.html for laundry app -->

<!DOCTYPE html>
<html>
<head>
    <title>Laundry App</title>
</head>
<body>

    <h1>Laundry History</h1>
    <div id="history"></div>

    <script>
        let laundryHistory = [];

        function addToHistory(price, pickupDate) {
            const record = { price, pickupDate };
            laundryHistory.push(record);
            displayHistory();
        }

        function displayHistory() {
            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = '';
            laundryHistory.forEach(item => {
                historyDiv.innerHTML += `<p>Price: ${item.price}, Pickup Date: ${item.pickupDate}</p>`;
            });
        }

        function resetForm() {
            // Your form resetting logic here
        }

        function handleError(response) {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response;
        }

        // Example usage
        addToHistory(20, '2026-04-30');

    </script>

</body>
</html>
