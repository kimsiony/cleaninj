<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁소 앱</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {margin:0;background:#f8fafc;font-family:system-ui;}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React;
const today = new Date().toISOString().split("T")[0];

function App(){

const [view,setView]=useState("list");
const [search,setSearch]=useState("");
const [selected,setSelected]=useState(null);
const [editMsg,setEditMsg]=useState("");
const [editingId,setEditingId]=useState(null);

const [customers,setCustomers]=useState(()=>{
  const s=localStorage.getItem("laundry");
  return s?JSON.parse(s):[];
});

const [form,setForm]=useState({
  name:"",phone:"",price:"",pickupDate:""
});

/* 저장 */
useEffect(()=>{
  localStorage.setItem("laundry",JSON.stringify(customers));
},[customers]);

/* 메시지 */
const makeMsg=c=>`안녕하세요 ${c.name}님 😊
세탁이 완료되었습니다.
방문 부탁드립니다 🙏`;

/* 문자 */
const sendSMSDirect=c=>{
  window.location.href=`sms:${c.phone}?body=${encodeURIComponent(makeMsg(c))}`;
};

/* 카톡 */
const sendKakaoDirect=c=>{
  window.open(`https://share.kakao.com/?text=${encodeURIComponent(makeMsg(c))}`);
};

/* 수정창 */
const openMsg=c=>{
  setSelected(c);
  setEditMsg(makeMsg(c));
};

const sendSMS=()=>{
  window.location.href=`sms:${selected.phone}?body=${encodeURIComponent(editMsg)}`;
};

const sendKakao=()=>{
  window.open(`https://share.kakao.com/?text=${encodeURIComponent(editMsg)}`);
};

/* ✔ 고객 수정 시작 */
const startEdit=(c)=>{
  setForm({
    name:c.name,
    phone:c.phone,
    price:c.price,
    pickupDate:c.pickupDate
  });
  setEditingId(c.id);
  setView("add");
};

/* 저장 (수정/신규 분기) */
const submit=()=>{
  if(!form.name||!form.phone) return alert("입력");

  if(editingId){
    setCustomers(customers.map(c=>
      c.id===editingId?{...c,...form}:c
    ));
  }else{
    setCustomers([...customers,{
      ...form,
      id:Date.now(),
      status:"세탁중",
      date:today
    }]);
  }

  setForm({name:"",phone:"",price:"",pickupDate:""});
  setEditingId(null);
  setView("list");
};

/* 검색 */
const list=customers.filter(c=>
  c.name.includes(search)||c.phone.includes(search)
);

/* 접수/수정 화면 */
if(view==="add"){
return (
<div style={page}>
<h2>{editingId?"고객 수정":"접수"}</h2>

<input placeholder="이름" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={input}/>
<input placeholder="연락처" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} style={input}/>
<input placeholder="가격" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} style={input}/>
<input type="date" value={form.pickupDate} onChange={e=>setForm({...form,pickupDate:e.target.value})} style={input}/>

<button onClick={submit} style={btn}>
{editingId?"수정 완료":"저장"}
</button>

<button onClick={()=>{setView("list");setEditingId(null)}} style={btnGray}>
취소
</button>

</div>
);
}

/* 리스트 */
return (
<div style={page}>
<h1>🧺 세탁소</h1>

<input placeholder="검색" value={search} onChange={e=>setSearch(e.target.value)} style={input}/>

<button onClick={()=>setView("add")} style={btn}>+ 접수</button>

{list.map(c=>(
<div key={c.id} style={card}>
<b>{c.name}</b> ({c.status})<br/>
{c.phone}<br/>
{c.price}원<br/>

<button onClick={()=>sendSMSDirect(c)} style={btnSmall}>📩 문자</button>
<button onClick={()=>sendKakaoDirect(c)} style={btnSmall}>💬 카톡</button>

<button onClick={()=>openMsg(c)} style={btnSmall}>✏️ 메시지수정</button>

<button onClick={()=>startEdit(c)} style={btnSmall}>
🛠 고객수정
</button>

</div>
))}

{selected && (
<div style={modal}>
<textarea value={editMsg} onChange={e=>setEditMsg(e.target.value)} style={{width:"100%",height:120}}/>
<button onClick={sendSMS} style={btn}>문자 보내기</button>
<button onClick={sendKakao} style={btn}>카톡 보내기</button>
<button onClick={()=>setSelected(null)} style={btnGray}>닫기</button>
</div>
)}

</div>
);
}

const page={padding:20,maxWidth:480,margin:"auto"};
const input={width:"100%",padding:10,margin:"5px 0",borderRadius:8,border:"1px solid #ddd"};
const btn={width:"100%",padding:12,marginTop:10,background:"#3b82f6",color:"#fff",border:"none",borderRadius:10};
const btnGray={...btn,background:"#94a3b8"};
const btnSmall={margin:3,padding:6,borderRadius:6};
const card={background:"#fff",padding:10,marginTop:10,borderRadius:10};
const modal={position:"fixed",bottom:0,left:0,right:0,background:"#fff",padding:10};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
