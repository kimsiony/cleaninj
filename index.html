<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁소</title>

<style>
body{font-family:sans-serif;background:#f1f5f9;margin:0;padding:20px}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px}
button{margin:3px;padding:6px;border-radius:6px;border:none;cursor:pointer}
input{width:100%;padding:8px;margin:5px 0}
.status{color:#fff;padding:6px;border-radius:8px;text-align:center;font-weight:bold}
</style>
</head>

<body>

<h2>🧺 세탁소</h2>

<input id="search" placeholder="검색" oninput="render()">
<button onclick="openForm()">+ 접수</button>

<div id="list"></div>

<!-- 입력폼 -->
<div id="formBox" style="display:none;background:#fff;padding:10px;border-radius:10px;">
<h3 id="formTitle">접수</h3>

<input id="name" placeholder="이름">
<input id="phone" placeholder="연락처">
<input id="price" placeholder="가격">
<input type="date" id="date">

<button onclick="pick('top')">상의</button>
<button onclick="pick('bottom')">하의</button>

<div id="items"></div>

<button onclick="save()">저장</button>
<button onclick="closeForm()">취소</button>
</div>

<!-- 선택창 -->
<div id="picker" style="display:none;background:#fff;padding:10px;"></div>

<script>

let customers = JSON.parse(localStorage.getItem("laundry")||"[]");
let form = {items:[]};
let editId = null;

const TOP=["티셔츠","셔츠","패딩","코트"];
const BOTTOM=["청바지","슬랙스","치마"];
const STATUS=["세탁대기","세탁중","세탁완료"];

/* 저장 */
function saveData(){
localStorage.setItem("laundry",JSON.stringify(customers));
}

/* 상태색 */
function color(s){
if(s=="세탁대기") return "#94a3b8";
if(s=="세탁중") return "#f59e0b";
return "#22c55e";
}

/* 상태 변경 */
function changeStatus(id){
customers=customers.map(c=>{
if(c.id!=id) return c;
let i=STATUS.indexOf(c.status||"세탁대기");
return {...c,status:STATUS[(i+1)%3]};
});
saveData();
render();
}

/* 품목 선택 */
function pick(type){
let list = type=="top"?TOP:BOTTOM;
let html="";
list.forEach(i=>{
html+=`<button onclick="addItem('${type}','${i}')">${i}</button>`;
});
document.getElementById("picker").innerHTML=html;
document.getElementById("picker").style.display="block";
}

/* 품목 추가 */
function addItem(cat,type){
let f=form.items.find(i=>i.type==type);
if(f) f.count++;
else form.items.push({cat,type,count:1});
renderItems();
}

/* 수량 */
function count(type,d){
form.items=form.items.map(i=>{
if(i.type!=type) return i;
let n=i.count+d;
return n<=0?null:{...i,count:n};
}).filter(Boolean);
renderItems();
}

/* 표시 */
function renderItems(){
let html="";
form.items.forEach(i=>{
html+=`${i.type} x${i.count}
<button onclick="count('${i.type}',1)">+</button>
<button onclick="count('${i.type}',-1)">-</button><br>`;
});
document.getElementById("items").innerHTML=html;
}

/* 저장 */
function save(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(!name||!phone){alert("입력");return;}

if(editId){
customers=customers.map(c=>c.id==editId?{...c,name,phone,items:form.items}:c);
}else{
customers.push({
id:Date.now(),
name,phone,
items:form.items,
status:"세탁대기"
});
}

saveData();
closeForm();
render();
}

/* 삭제 */
function del(id){
if(!confirm("삭제?")) return;
customers=customers.filter(c=>c.id!=id);
saveData();
render();
}

/* 문자 */
function sms(c){
location.href=`sms:${c.phone}?body=${encodeURIComponent("세탁 완료되었습니다 "+c.name+"님")}`;
}

/* 카톡 */
function kakao(c){
window.open(`https://share.kakao.com/?text=${encodeURIComponent("세탁 완료 "+c.name)}`);
}

/* 수정 */
function edit(c){
editId=c.id;
form={items:c.items||[]};
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
openForm();
renderItems();
}

/* 폼 */
function openForm(){
document.getElementById("formBox").style.display="block";
}
function closeForm(){
document.getElementById("formBox").style.display="none";
form={items:[]};
editId=null;
}

/* 리스트 */
function render(){
let s=document.getElementById("search").value;
let html="";

customers.filter(c=>c.name.includes(s)||c.phone.includes(s))
.forEach(c=>{
html+=`
<div class="card">

<div class="status" style="background:${color(c.status)}"
onclick="changeStatus(${c.id})">
${c.status} (클릭)
</div>

<b>${c.name}</b><br>
${c.phone}<br>
${(c.items||[]).map(i=>i.type+" x"+i.count).join(",")}<br>

<button onclick='sms(${JSON.stringify(c)})'>📩</button>
<button onclick='kakao(${JSON.stringify(c)})'>💬</button>
<button onclick='edit(${JSON.stringify(c)})'>✏️</button>
<button onclick='del(${c.id})'>🗑</button>

</div>`;
});

document.getElementById("list").innerHTML=html;
}

render();

</script>

</body>
</html>
