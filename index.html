<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세탁소 앱</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f6f8; }
.header { background:#2563eb; color:white; padding:15px; text-align:center; }

.container { padding:15px; }

.character { text-align:center; font-size:50px; }

input { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:1px solid #ccc; }

button { margin-top:8px; padding:10px; border:none; border-radius:8px; background:#2563eb; color:white; }

.category button { margin-right:5px; }

.item { background:white; padding:10px; border-radius:10px; margin-top:8px; }

h3,h4 { margin-top:20px; }
</style>
</head>

<body>

<div class="header">
  <h2>은현이네 세탁소</h2>
</div>

<div class="container">

  <!-- 접수 -->
  <h3>고객 접수</h3>
  <div class="character">🧑‍🔧</div>

  <input id="name" placeholder="이름">
  <input id="phone" placeholder="전화번호" oninput="findCustomer()">

  <h4>📜 이전 기록</h4>
  <div id="history"></div>

  <div class="category">
    <button onclick="selectCategory('상의')">상의</button>
    <button onclick="selectCategory('하의')">하의</button>
    <button onclick="selectCategory('신발')">신발</button>
    <button onclick="selectCategory('모자')">모자</button>
  </div>

  <div id="options"></div>

  <input id="custom" placeholder="직접 입력">

  <h4>선택된 항목</h4>
  <div id="selected"></div>

  <input id="price" placeholder="가격">

  <button onclick="save()">접수하기</button>

  <!-- 리스트 -->
  <h3>📦 진행중</h3>
  <div id="progress"></div>

  <h3>✅ 완료 고객</h3>
  <div id="done"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data") || "[]");
let selectedItems = [];
let currentCategory = "";

const dataMap = {
  "상의":["셔츠","티셔츠","니트"],
  "하의":["청바지","슬랙스"],
  "신발":["운동화","구두"],
  "모자":["캡","비니"]
};

function getToday() {
  return new Date().toISOString().split("T")[0];
}

/* 카테고리 */
function selectCategory(cat){
  currentCategory = cat;
  const list = dataMap[cat];

  let html = "<h4>"+cat+"</h4>";
  list.forEach(item=>{
    html += `<div class="item">${item} <button onclick="addItem('${item}')">+</button></div>`;
  });

  document.getElementById("options").innerHTML = html;
}

function addItem(item){
  selectedItems.push(item);
  renderSelected();
}

function renderSelected(){
  const el = document.getElementById("selected");
  el.innerHTML = "";

  selectedItems.forEach((i,index)=>{
    el.innerHTML += `<div class="item">${i} <button onclick="removeItem(${index})">❌</button></div>`;
  });
}

function removeItem(i){
  selectedItems.splice(i,1);
  renderSelected();
}

/* 고객 찾기 */
function findCustomer(){
  const phone = document.getElementById("phone").value;

  const historyEl = document.getElementById("history");
  historyEl.innerHTML = "";

  const list = data.filter(d=>d.phone === phone);

  if(list.length>0){
    document.getElementById("name").value = list[0].name;

    list.slice().reverse().forEach(d=>{
      historyEl.innerHTML += `
        <div class="item">
          📅 ${d.date}<br>
          👕 ${d.items.join(", ")}<br>
          💰 ${d.price}원
        </div>
      `;
    });
  }
}

/* 저장 */
function save(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const price = document.getElementById("price").value;
  const custom = document.getElementById("custom").value;

  if(custom) selectedItems.push(custom);

  data.push({
    name,
    phone,
    items:[...selectedItems],
    price,
    done:false,
    date:getToday()
  });

  localStorage.setItem("data", JSON.stringify(data));

  alert("접수 완료!");
  location.reload();
}

/* 문자 */
function sendSMS(phone){
  const msg = "세탁이 완료되었습니다.\n한국사 세탁소\nT.02-2684-4003";
  location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
}

/* 완료 */
function complete(i){
  data[i].done = true;
  localStorage.setItem("data", JSON.stringify(data));
  sendSMS(data[i].phone);
  render();
}

/* 수정 */
function edit(i){
  const d = data[i];

  const name = prompt("이름", d.name);
  const price = prompt("가격", d.price);

  if(name) d.name = name;
  if(price) d.price = price;

  localStorage.setItem("data", JSON.stringify(data));
  render();
}

/* 삭제 */
function removeData(i){
  if(confirm("삭제할까요?")){
    data.splice(i,1);
    localStorage.setItem("data", JSON.stringify(data));
    render();
  }
}

/* 렌더 */
function render(){
  const progressEl = document.getElementById("progress");
  const doneEl = document.getElementById("done");

  progressEl.innerHTML="";
  doneEl.innerHTML="";

  data.forEach((d,i)=>{
    const html = `
      <div class="item">
        <strong>${d.name}</strong> (${d.phone})<br>
        👕 ${d.items.join(", ")}<br>
        💰 ${d.price}원<br>
        📅 ${d.date}<br>

        ${!d.done ? `<button onclick="complete(${i})">완료+문자</button>` : ""}

        <button onclick="edit(${i})">수정</button>
        <button onclick="removeData(${i})">삭제</button>
      </div>
    `;

    if(d.done) doneEl.innerHTML += html;
    else progressEl.innerHTML += html;
  });
}

render();
</script>

</body>
</html>
